<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Clicker Game</title>
</head>
<body>
    <header>
        <h1>Clicker Game</h1>
    </header>
    <main>
        <div class="panel" id="clickPanel">
            <p id="scoreDisplay">0</p>
            <button id="mainButton" type="button">Click Me!</button>
        </div>
        <div class="panel" id="upgradePanel">
            <div class="upgradeContainer" id="clickUpgrade">
                <p class="UpgradeCostDisplay">Cost: 10</p>
                <button class="UpgradeButton" type="button">Upgrade Click Amount</button>
            </div>
            <div id="autoClickUpgrades">
                <div class="upgradeContainer" id="autoClickAmountUpgrade">
                    <p class="UpgradeCostDisplay">Cost: 100</p>
                    <button class="UpgradeButton" type="button">Upgrade AutoClick Amount</button>
                </div>
                <div class="upgradeContainer" id="autoClickDelayUpgrade">
                    <p class="UpgradeCostDisplay">Cost: 1000</p>
                    <button class="UpgradeButton" type="button">Decrease AutoClick Delay</button>
                </div>
            </div>
        </div>
    </main>
    <footer>

    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
